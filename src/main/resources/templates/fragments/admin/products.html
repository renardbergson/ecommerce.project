<section id="produtos-section" class="admin-section" th:fragment="products" xmlns:th="http://www.thymeleaf.org">
    <div class="admin-header-section">
        <h2><i class="fas fa-box"></i> Gestão de Produtos</h2>
        <a href="admin.html" class="btn btn-primary" id="add-produto-btn">
            <i class="fas fa-plus"></i> Adicionar Produto
        </a>
    </div>

    <!-- Products Form -->
    <!--/*@thymesVar id="product" type="com.project.ecommerce.project.ecommerce.models.Product"*/-->
    <form th:object="${product}" th:action="@{/admin/product/save}" id="produto-form" class="form-grid two-columns" action="admin.html" method="POST">
        <!-- Mandar o id do produto (quando existir) já faz com que o ORM saiba que se trata de uma atualização! -->
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="produto-nome">Nome do Produto</label>
            <input type="text" id="produto-nome" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label for="produto-categoria">Categoria</label>
            <select id="produto-categoria" th:field="*{category}" required>
                <option value="">Selecione uma categoria</option>
                <option value="ELECTRONICS">Eletrônicos</option>
                <option value="CLOTHING">Roupas e Acessórios</option>
                <option value="HOME_GARDEN">Casa e Jardim</option>
                <option value="SPORTS">Esportes e Lazer</option>
                <option value="TOYS">Brinquedos</option>
                <option value="BEAUTY">Beleza e Saúde</option>
                <option value="AUTOMOTIVE">Automotivo</option>
            </select>
        </div>

        <div class="form-group">
            <label for="produto-preco">Preço</label>
            <input type="number" id="produto-preco" th:field="*{price}" step="0.01" value="0" required>
        </div>

        <div class="form-group">
            <label for="produto-status">Status</label>
            <select id="produto-status" th:field="*{status}" required>
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label for="produto-descricao">Descrição</label>
            <textarea id="produto-descricao" th:field="*{description}" rows="4" required></textarea>
        </div>

        <div class="form-actions">
            <a th:href="@{/admin/product}" type="button" class="btn btn-outline btn-form">
                <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-primary btn-form">
                <i class="fas fa-save"></i> Salvar
            </button>
        </div>
    </form>
    <br><hr><br>
    <!-- Fim Form Produto Section -->

    <!-- Products Table -->
    <!-- Filters -->
    <div class="admin-filters">
        <div class="filter-group">
            <input type="text" id="search-produtos" placeholder="Buscar produtos..." class="admin-input">
            <select id="filter-categoria" class="admin-select" onchange="window.location.href = 'admin.html' + (this.value ? '?category=' + encodeURIComponent(this.value) : '')">
                <option value="" selected>Todas as categorias</option>
                <option value="ELECTRONICS">Eletrônicos</option>
                <option value="CLOTHING">Roupas e Acessórios</option>
                <option value="HOME_GARDEN">Casa e Jardim</option>
                <option value="SPORTS">Esportes e Lazer</option>
                <option value="TOYS">Brinquedos</option>
                <option value="BEAUTY">Beleza e Saúde</option>
                <option value="AUTOMOTIVE">Automotivo</option>
            </select>
        </div>
    </div>

    <div class="admin-table-container">
        <table class="admin-table" id="produtos-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody>


            <!--/*@thymesVar id="products" type="com.project.ecommerce.project.ecommerce.models.Product"*/-->
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.category}"></td>
                <td th:text="${product.price}"></td>
                <td th:text="${product.status}"></td>
                <td class="action-buttons">
                    <a th:href="@{/admin/product/edit/{id}(id=${product.id})}" class="btn-icon btn-edit" title="Editar">
                        <i class="fas fa-edit"></i>
                    </a>
                    <a th:href="@{/admin/product/delete/{id}(id=${product.id})}" class="btn-icon btn-delete" title="Excluir">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
