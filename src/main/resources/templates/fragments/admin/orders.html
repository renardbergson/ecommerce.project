<section id="pedidos-section" class="admin-section" th:fragment="orders">
  <div class="admin-header-section">
    <h2><i class="fas fa-shopping-cart"></i> Gestão de Pedidos</h2>
  </div>

  <!-- Filters -->
  <div class="admin-filters">
    <div class="filter-group">
      <input type="text" id="search-pedidos" placeholder="Buscar por cliente ou pedido..." class="admin-input">
      <select id="filter-status-pedido" class="admin-select" onchange="window.location.href = 'admin.html' + (this.value ? '?status=' + encodeURIComponent(this.value) : '')">
        <option value="" selected>Todos os Status</option>
        <option value="PENDING">Pendente</option>
        <option value="CONFIRMED">Confirmado</option>
        <option value="PAID">Pago</option>
        <option value="SHIPPED">Enviado</option>
        <option value="DELIVERED">Entregue</option>
        <option value="CANCELLED">Cancelado</option>
      </select>
    </div>
  </div>

  <div class="admin-table-container">
    <table class="admin-table" id="pedidos-table">
      <thead>
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Total Itens</th>
        <th>Valor Total</th>
        <th>Status</th>
        <th>Pagamento</th>
        <th>Data</th>
        <th>Ações</th>
      </tr>
